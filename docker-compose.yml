services:
  whisper:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1}
    container_name: whisper
    shm_size: '2gb'
    ports:
      - "56178:56178"
    volumes:
      - ./models:/root/.cache/huggingface
    environment:
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1}
      - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
    deploy:
      resources:
        limits:
          memory: 8G 
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command:
      - uvicorn
      - app:app
      - --host
      - 0.0.0.0
      - --port
      - "56178"
    restart: unless-stopped
